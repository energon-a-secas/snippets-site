<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snippets | Search, Copy, Ship</title>
  <meta name="description" content="Curated shell commands and code snippets for macOS, bash, data extraction, and text processing. Search and copy, no AI prompting needed">
  <meta property="og:title" content="Snippets — Search, Copy, Ship">
  <meta property="og:description" content="Curated shell commands and code snippets. Searching is faster than prompting">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://snippets.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Snippets — Search, Copy, Ship">
  <meta name="twitter:description" content="Curated shell commands and code snippets. Searching is faster than prompting">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://snippets.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta name="theme-color" content="#040714">
  <meta property="og:image" content="https://snippets.neorgon.com/og-preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:image" content="https://snippets.neorgon.com/og-preview.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Snippets",
    "description": "Curated shell commands and code snippets for macOS, bash, data extraction, and text processing",
    "url": "https://snippets.neorgon.com/",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
  }
  </script>
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <header class="header-bar">
    <div class="header-logo">
      <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
        <img src="energon-classic-logo.png" class="header-logo-img" alt="Logo">
      </a>
      <div>
        <h1>Snippets</h1>
        <div class="header-subtitle">Search, copy, ship</div>
      </div>
    </div>
    <a class="header-home" href="https://neorgon.com/" title="neorgon.com" aria-label="Neorgon home">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </header>

  <main id="main">
    <div class="container">
      <p class="motto"><strong>Searching is faster than prompting.</strong> Copy what you need, skip the chat.</p>

      <div class="search-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input id="search-input" class="search-input" type="text" placeholder="Search by title, command, keyword..." aria-label="Search snippets">
        </div>
        <button id="clear-search" class="clear-btn">Clear<span class="kbd">/</span></button>
      </div>

      <div class="filter-row">
        <div class="dropdown" id="dd-category">
          <button class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false">
            <span class="dropdown-label">Category</span>
            <span class="dropdown-value">All</span>
            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="dropdown-menu" role="listbox" id="dd-category-menu"></ul>
        </div>

        <div class="dropdown" id="dd-platform">
          <button class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false">
            <span class="dropdown-label">Platform</span>
            <span class="dropdown-value">All</span>
            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="dropdown-menu" role="listbox" id="dd-platform-menu"></ul>
        </div>

        <div class="dropdown" id="dd-tags">
          <button class="dropdown-toggle" aria-haspopup="listbox" aria-expanded="false">
            <span class="dropdown-label">Tags</span>
            <span class="dropdown-value">All</span>
            <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="dropdown-menu multi" role="listbox" aria-multiselectable="true" id="dd-tags-menu"></ul>
        </div>

        <span id="result-count" class="result-count"></span>
      </div>

      <div id="snippets-grid"></div>

      <div class="suggest-bar">
        <button id="suggest-btn" class="suggest-trigger">Suggest a snippet</button>
      </div>
    </div>
  </main>

  <div id="suggest-modal" class="suggest-modal">
    <div class="suggest-panel">
      <h3>Suggest a Snippet</h3>
      <label for="suggest-title">Title</label>
      <input id="suggest-title" type="text" placeholder="e.g. Convert HEIC to PNG">
      <label for="suggest-command">Command</label>
      <textarea id="suggest-command" rows="3" placeholder="e.g. for f in *.HEIC; do sips -s format png &quot;$f&quot; --out &quot;${f%.HEIC}.png&quot;; done"></textarea>
      <label for="suggest-desc">Description (optional)</label>
      <input id="suggest-desc" type="text" placeholder="What does it do?">
      <div class="suggest-actions">
        <button id="suggest-close" class="btn-secondary">Cancel</button>
        <button id="suggest-copy" class="btn-primary">Copy suggestion</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
